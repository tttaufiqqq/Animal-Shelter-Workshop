# systemd drop-in — wraps php8.3-fpm's normal ExecStart under `vault agent`
# (agent-fpm.hcl's own `exec` stanza runs php-fpm) so secrets are injected
# straight into the process environment, never written to disk (see
# infrastructure/ansible/playbooks/tasks/vault-agent.yml). This Vault version
# (v2.0.3) has no CLI `-exec` flag — confirmed live, the first attempt at this
# override crashed php-fpm outright ("flag provided but not defined: -exec"),
# which is why the exec command lives in the config file instead.
# Type=notify -> simple: exec mode doesn't forward php-fpm's sd_notify readiness
# signal, so the default Type=notify unit would time out waiting for one.
# Rollback: delete this file, daemon-reload, restart php8.3-fpm — the package's
# original ExecStart (line cleared below) takes over again unmodified.
[Service]
Type=simple
RuntimeDirectory=vault-agent
ExecStart=
ExecStart=/usr/bin/vault agent -config=/etc/vault-agent/agent-fpm.hcl
