- name: Provision linux-mysql (MySQL 8.0)
  hosts: linux-mysql
  become: true

  vars:
    db_name: workshop_2
    db_user: workshop_2
    db_password: workshop_2
    mysql_config: /etc/mysql/mysql.conf.d/mysqld.cnf

  tasks:
    - name: Install MySQL and Python MySQL client
      apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present
        update_cache: true

    - name: Start and enable MySQL
      service:
        name: mysql
        state: started
        enabled: true

    - name: Allow remote connections
      lineinfile:
        path: "{{ mysql_config }}"
        regexp: '^bind-address'
        line: "bind-address = 0.0.0.0"
      notify: Restart MySQL

    - name: Enable log_bin_trust_function_creators (needed for trigger creation)
      lineinfile:
        path: "{{ mysql_config }}"
        insertafter: '^bind-address'
        line: "log_bin_trust_function_creators = 1"
      notify: Restart MySQL

    - name: Flush handlers so config is applied before DB tasks
      meta: flush_handlers

    - name: Create workshop_2 database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        encoding: utf8mb4
        collation: utf8mb4_unicode_ci
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create workshop_2 user (allow from any host)
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        host: "%"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: UFW — default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming

    - name: UFW — default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: UFW — SSH from admin machine via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.68.235.121"
        to_port: "22"
        proto: tcp
        comment: "SSH from msi admin machine"

    - name: UFW — MySQL from app-server via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.100.123.90"
        to_port: "3306"
        proto: tcp
        comment: "MySQL from app-server"

    - name: UFW — enable
      community.general.ufw:
        state: enabled

    # ── Backups ──────────────────────────────────────────────────────────────
    - name: Create the backup directory
      file:
        path: /var/backups/workshop_2
        state: directory
        owner: root
        mode: "0700"

    - name: Deploy the nightly backup script
      template:
        src: ../templates/backup-mysql.sh.j2
        dest: /usr/local/bin/backup-workshop-db.sh
        owner: root
        mode: "0700"

    - name: Deploy the backup systemd service
      template:
        src: ../templates/db-backup.service.j2
        dest: /etc/systemd/system/workshop-db-backup.service
      vars:
        backup_engine_label: MySQL
        backup_run_as_user: root
      notify: Reload systemd (backup)

    - name: Deploy the backup systemd timer
      template:
        src: ../templates/db-backup.timer.j2
        dest: /etc/systemd/system/workshop-db-backup.timer
      notify: Reload systemd (backup)

    - name: Flush handlers before enabling the backup timer
      meta: flush_handlers

    - name: Enable and start the nightly backup timer
      systemd:
        name: workshop-db-backup.timer
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart MySQL
      service:
        name: mysql
        state: restarted

    - name: Reload systemd (backup)
      systemd:
        daemon_reload: true
