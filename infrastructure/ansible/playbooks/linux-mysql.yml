- name: Provision linux-mysql (MySQL 8.0)
  hosts: linux-mysql
  become: true

  vars:
    db_name: workshop_2
    db_user: workshop_2
    # Sourced from Vault (group_vars/all.yml's asw_secrets) — was hardcoded
    # here and in env-app.j2 as two copies of the same literal, free to drift.
    db_password: "{{ asw_secrets.db_password }}"
    mysql_config: /etc/mysql/mysql.conf.d/mysqld.cnf

  tasks:
    - name: Install MySQL and Python MySQL client
      apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present
        update_cache: true

    - name: Start and enable MySQL
      service:
        name: mysql
        state: started
        enabled: true

    - name: Allow remote connections
      lineinfile:
        path: "{{ mysql_config }}"
        regexp: '^bind-address'
        line: "bind-address = 0.0.0.0"
      notify: Restart MySQL

    - name: Enable log_bin_trust_function_creators (needed for trigger creation)
      lineinfile:
        path: "{{ mysql_config }}"
        insertafter: '^bind-address'
        line: "log_bin_trust_function_creators = 1"
      notify: Restart MySQL

    - name: Flush handlers so config is applied before DB tasks
      meta: flush_handlers

    - name: Create workshop_2 database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        encoding: utf8mb4
        collation: utf8mb4_unicode_ci
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Create workshop_2 user (allow from any host)
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        host: "%"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: UFW — default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming

    - name: UFW — default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: UFW — SSH from admin machine via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.68.235.121"
        to_port: "22"
        proto: tcp
        comment: "SSH from msi admin machine"

    - name: UFW — MySQL from app-server via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.100.123.90"
        to_port: "3306"
        proto: tcp
        comment: "MySQL from app-server"

    - name: UFW — enable
      community.general.ufw:
        state: enabled

    # ── Backups ──────────────────────────────────────────────────────────────
    # Per-host backup timers retired in favor of one coordinated backup run
    # from app-server (php artisan db:backup) — see docs/10-backups.md for why:
    # per-host dumps never left this VM, never covered msi, and had no
    # cross-database integrity check. These tasks stop and remove the old
    # unit on already-provisioned hosts; they don't reinstall it.
    - name: Stop and disable the retired per-host backup timer
      systemd:
        name: workshop-db-backup.timer
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove the retired backup systemd timer unit
      file:
        path: /etc/systemd/system/workshop-db-backup.timer
        state: absent
      notify: Reload systemd (backup)

    - name: Remove the retired backup systemd service unit
      file:
        path: /etc/systemd/system/workshop-db-backup.service
        state: absent
      notify: Reload systemd (backup)

    - name: Remove the retired backup script
      file:
        path: /usr/local/bin/backup-workshop-db.sh
        state: absent

    # /var/backups/workshop_2 is left in place — delete manually once the
    # centralized backup on app-server is confirmed working.

  handlers:
    - name: Restart MySQL
      service:
        name: mysql
        state: restarted

    - name: Reload systemd (backup)
      systemd:
        daemon_reload: true
