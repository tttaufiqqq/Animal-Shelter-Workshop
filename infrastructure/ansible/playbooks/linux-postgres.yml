- name: Provision linux-postgres (PostgreSQL)
  hosts: linux-postgres
  become: true

  vars:
    # workshop_2_prod, not workshop_2 — DBA-style prod/dev split: this server
    # also carries a workshop_2_dev database (dev environment's local .env,
    # not managed by this playbook) alongside the prod one this playbook
    # provisions. See CLAUDE.md's Database Connection Mapping.
    db_name: workshop_2_prod
    db_user: workshop_2_prod
    # Sourced from Vault (group_vars/all.yml's asw_secrets) — was hardcoded
    # here and in env-app.j2 as two copies of the same literal, free to drift.
    db_password: "{{ asw_secrets.db_password }}"

  tasks:
    - name: Install PostgreSQL and Python psycopg2
      apt:
        name:
          - postgresql
          - python3-psycopg2
        state: present
        update_cache: true

    # Ansible's become_user (used below to run as postgres) needs setfacl to
    # hand an unprivileged user access to its temp files; without it, Ansible
    # falls back to a non-Linux chmod ACL dialect that fails outright on
    # Ubuntu — same bug already documented and fixed for app-server's
    # become_user: www-data (see app-server.yml), just never ported here.
    # Found live: "Create workshop_2 database" crashed with
    # "chmod: invalid mode: 'A+user:postgres:rx:allow'" during CD bootstrap.
    - name: Install acl (required for become_user privilege de-escalation)
      apt:
        name: acl
        state: present

    - name: Start and enable PostgreSQL
      service:
        name: postgresql
        state: started
        enabled: true

    - name: Get PostgreSQL version
      command: psql --version
      register: pg_version_raw
      changed_when: false

    - name: Parse PostgreSQL major version
      set_fact:
        pg_version:
          stdout: "{{ pg_version_raw.stdout | regex_search('(\\d+)', '\\1') | first }}"

    # Allow connections from all IPs (Tailscale network is the security boundary)
    - name: Set listen_addresses to all
      lineinfile:
        path: /etc/postgresql/{{ pg_version.stdout }}/main/postgresql.conf
        regexp: "^#?listen_addresses"
        line: "listen_addresses = '*'"
      notify: Restart PostgreSQL

    # A connection left idle inside an open transaction (e.g. a killed app
    # process that never rolled back) holds its locks forever otherwise —
    # this is exactly what blocked new connections for ~2 hours during this
    # project's own hardening pass. Auto-terminate after 5 minutes idle.
    - name: Set idle_in_transaction_session_timeout to 5 minutes
      lineinfile:
        path: /etc/postgresql/{{ pg_version.stdout }}/main/postgresql.conf
        regexp: "^#?idle_in_transaction_session_timeout"
        line: "idle_in_transaction_session_timeout = 5min"
      notify: Restart PostgreSQL

    - name: Allow MD5 auth from all IPs in pg_hba.conf
      lineinfile:
        path: /etc/postgresql/{{ pg_version.stdout }}/main/pg_hba.conf
        line: "host    all    all    0.0.0.0/0    md5"
        insertafter: EOF
      notify: Restart PostgreSQL

    - name: Flush handlers
      meta: flush_handlers

    - name: Create workshop_2 database
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        encoding: UTF8
        state: present
      become_user: postgres

    - name: Create workshop_2 user
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        state: present
      become_user: postgres

    - name: Grant all privileges on database to workshop_2
      community.postgresql.postgresql_privs:
        database: "{{ db_name }}"
        roles: "{{ db_user }}"
        type: database
        privs: ALL
        state: present
      become_user: postgres

    # PostgreSQL 15+ no longer grants CREATE on public schema by default
    - name: Grant CREATE on public schema (PostgreSQL 15+)
      community.postgresql.postgresql_privs:
        database: "{{ db_name }}"
        roles: "{{ db_user }}"
        type: schema
        objs: public
        privs: ALL
        state: present
      become_user: postgres

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: UFW — default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming

    - name: UFW — default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: UFW — SSH from admin machine via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.68.235.121"
        to_port: "22"
        proto: tcp
        comment: "SSH from msi admin machine"

    - name: UFW — SSH from linux-gh-runner (CD) via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.72.6.40"
        to_port: "22"
        proto: tcp
        comment: "SSH from linux-gh-runner (CD)"

    - name: UFW — PostgreSQL from app-server via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.100.123.90"
        to_port: "5432"
        proto: tcp
        comment: "PostgreSQL from app-server"

    - name: UFW — enable
      community.general.ufw:
        state: enabled

    # ── Backups ──────────────────────────────────────────────────────────────
    # Per-host backup timers retired in favor of one coordinated backup run
    # from app-server (php artisan db:backup) — see docs/10-backups.md for why:
    # per-host dumps never left this VM and had no cross-database integrity
    # check. These tasks stop and remove the old unit on already-provisioned
    # hosts; they don't reinstall it.
    - name: Stop and disable the retired per-host backup timer
      systemd:
        name: workshop-db-backup.timer
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove the retired backup systemd timer unit
      file:
        path: /etc/systemd/system/workshop-db-backup.timer
        state: absent
      notify: Reload systemd (backup)

    - name: Remove the retired backup systemd service unit
      file:
        path: /etc/systemd/system/workshop-db-backup.service
        state: absent
      notify: Reload systemd (backup)

    - name: Remove the retired backup script
      file:
        path: /usr/local/bin/backup-workshop-db.sh
        state: absent

    # /var/backups/workshop_2 is left in place — delete manually once the
    # centralized backup on app-server is confirmed working.

  handlers:
    - name: Restart PostgreSQL
      service:
        name: postgresql
        state: restarted

    - name: Reload systemd (backup)
      systemd:
        daemon_reload: true
