- name: Provision app-server (PHP 8.3 + Nginx + Composer)
  hosts: app-server
  become: true

  tasks:
    - name: Add ondrej/php PPA (PHP 8.3 for Ubuntu)
      apt_repository:
        repo: ppa:ondrej/php
        state: present
        update_cache: true

    - name: Install PHP 8.3 and required extensions
      apt:
        name:
          - php8.3
          - php8.3-fpm
          - php8.3-cli
          - php8.3-mbstring
          - php8.3-xml
          - php8.3-curl
          - php8.3-zip
          - php8.3-bcmath
          - php8.3-pdo
          - php8.3-mysql       # PDO MySQL (for reporting/booking/shelter/animals)
          - php8.3-pgsql       # PDO PostgreSQL (for users)
          - php8.3-gd
          - php8.3-intl
          - php8.3-redis
        state: present

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Install Node.js 20 LTS
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Install Composer
      shell: |
        curl -sS https://getcomposer.org/installer | php
        mv composer.phar /usr/local/bin/composer
        chmod +x /usr/local/bin/composer
      args:
        creates: /usr/local/bin/composer

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: true

    - name: Start and enable PHP-FPM
      service:
        name: php8.3-fpm
        state: started
        enabled: true

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: UFW — default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming

    - name: UFW — default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: UFW — SSH from admin machine via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.68.235.121"
        to_port: "22"
        proto: tcp
        comment: "SSH from msi admin machine"

    - name: UFW — HTTP public
      community.general.ufw:
        rule: allow
        to_port: "80"
        proto: tcp
        comment: "HTTP public"

    - name: UFW — HTTPS public
      community.general.ufw:
        rule: allow
        to_port: "443"
        proto: tcp
        comment: "HTTPS public"

    - name: UFW — enable
      community.general.ufw:
        state: enabled

    # ── Application deployment ────────────────────────────────────────────────
    - name: Clone application repository
      git:
        repo: https://github.com/tttaufiqqq/Animal-Shelter-Workshop.git
        dest: /var/www/animal-shelter
        version: main
        force: false
      become_user: workshop

    - name: Set web root ownership
      file:
        path: /var/www/animal-shelter
        owner: workshop
        group: www-data
        recurse: true

    - name: Set storage and cache permissions
      file:
        path: "{{ item }}"
        mode: "0775"
        recurse: true
      loop:
        - /var/www/animal-shelter/storage
        - /var/www/animal-shelter/bootstrap/cache

    - name: Install Composer dependencies
      composer:
        command: install
        arguments: "--no-dev --optimize-autoloader --no-interaction"
        working_dir: /var/www/animal-shelter
      become_user: workshop

    - name: Deploy .env from template (skip if already exists)
      template:
        src: ../templates/env-app.j2
        dest: /var/www/animal-shelter/.env
        owner: workshop
        group: www-data
        mode: "0640"
        force: false

    - name: Generate application key
      command: php artisan key:generate --force
      args:
        chdir: /var/www/animal-shelter
      become_user: workshop

    - name: Build frontend assets
      command: npm ci && npm run build
      args:
        chdir: /var/www/animal-shelter
        creates: /var/www/animal-shelter/public/build/manifest.json
      become_user: workshop

    - name: Deploy Nginx site config
      template:
        src: ../templates/nginx-app.conf.j2
        dest: /etc/nginx/sites-available/animal-shelter
      notify: Reload Nginx

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/animal-shelter
        dest: /etc/nginx/sites-enabled/animal-shelter
        state: link
      notify: Reload Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Flush handlers before migrations
      meta: flush_handlers

    - name: Run database migrations and seed
      command: php artisan db:fresh-all --seed
      args:
        chdir: /var/www/animal-shelter
      become_user: workshop
      environment:
        HOME: /home/workshop

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded
