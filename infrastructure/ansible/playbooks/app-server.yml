- name: Provision app-server (PHP 8.3 + Nginx + Composer)
  hosts: app-server
  become: true

  # Ansible's apt tasks run over a non-pty SSH channel, so needrestart's
  # default interactive "which services should restart?" debconf dialog has
  # nothing to render to and hangs indefinitely rather than erroring — hit
  # this for real on a live run (Install Node.js 20 LTS stalled >10 minutes
  # on apt-transport-https's needrestart hook). needrestart.conf's own
  # $nrconf{restart}='a' wasn't sufficient on its own; these two env vars are
  # the documented belt-and-suspenders fix and apply to every apt/shell task
  # in this play, not just the one that first hit it.
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a

  vars:
    # Public access is now a Cloudflare Tunnel (outbound-only, no port
    # forwarding) which terminates TLS itself — see
    # oracle-db-learning-proxmox/docs/10-cloudflare-tunnel/. The certbot
    # webroot flow below needs a public DNS A record and inbound :443, which
    # the tunnel doesn't provide, so it's off by default. Nginx still serves
    # plain HTTP on :80 for the tunnel to connect to. Set -e use_certbot=true
    # only if direct HTTPS (bypassing the tunnel) is restored later.
    use_certbot: false

  # Tags: "provision" = one-time/rare host setup (packages, UFW, TLS, Vault
  # Agent install, scheduler unit) — never run by CD. "deploy" = what CD runs
  # on every push (code, dependencies, secrets render, migrations, caches).
  # See docs/12-cd.md for why the split exists and how CD invokes each.
  tasks:
    - name: Add ondrej/php PPA (PHP 8.3 for Ubuntu)
      apt_repository:
        repo: ppa:ondrej/php
        state: present
        update_cache: true
      tags: [provision]

    - name: Install PHP 8.3 and required extensions
      apt:
        name:
          - php8.3
          - php8.3-fpm
          - php8.3-cli
          - php8.3-mbstring
          - php8.3-xml
          - php8.3-curl
          - php8.3-zip
          - php8.3-bcmath
          - php8.3-pdo
          - php8.3-mysql       # PDO MySQL (for reporting/booking/shelter/animals)
          - php8.3-pgsql       # PDO PostgreSQL (for users)
          - php8.3-gd
          - php8.3-intl
          - php8.3-redis
        state: present
      tags: [provision]

    # The PDO extensions above let PHP query the 3 remote databases, but
    # php artisan db:backup shells out to the native dump/restore binaries
    # directly (mysqldump/mysql, pg_dump/pg_restore/psql) — those aren't
    # provided by the PDO packages and must be installed separately.
    - name: Install MySQL/MariaDB and PostgreSQL client tools (for db:backup / db:restore)
      apt:
        name:
          - mysql-client
          - postgresql-client
        state: present
      tags: [provision]

    - name: Install Nginx
      apt:
        name: nginx
        state: present
      tags: [provision]

    # Ansible's become_user (used below to run as www-data) needs setfacl to
    # hand an unprivileged user access to its temp files; without it, Ansible
    # falls back to a non-Linux chmod ACL dialect that fails outright on
    # Ubuntu. Found missing when a real --check run hit "Verify www-data can
    # write to storage/logs" for the first time.
    - name: Install acl (required for become_user privilege de-escalation)
      apt:
        name: acl
        state: present
      tags: [provision]

    - name: Install Node.js 20 LTS
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node
      tags: [provision]

    - name: Install Composer
      shell: |
        curl -sS https://getcomposer.org/installer | php
        mv composer.phar /usr/local/bin/composer
        chmod +x /usr/local/bin/composer
      args:
        creates: /usr/local/bin/composer
      tags: [provision]

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: true
      tags: [provision]

    - name: Start and enable PHP-FPM
      service:
        name: php8.3-fpm
        state: started
        enabled: true
      tags: [provision]

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: UFW — default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming
      tags: [provision]

    - name: UFW — default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing
      tags: [provision]

    - name: UFW — SSH from admin machine via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.68.235.121"
        to_port: "22"
        proto: tcp
        comment: "SSH from msi admin machine"
      tags: [provision]

    - name: UFW — SSH from linux-gh-runner (CD) via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.72.6.40"
        to_port: "22"
        proto: tcp
        comment: "SSH from linux-gh-runner (CD)"
      tags: [provision]

    - name: UFW — HTTP public
      community.general.ufw:
        rule: allow
        to_port: "80"
        proto: tcp
        comment: "HTTP public"
      tags: [provision]

    - name: UFW — HTTPS public
      community.general.ufw:
        rule: allow
        to_port: "443"
        proto: tcp
        comment: "HTTPS public"
      tags: [provision]

    - name: UFW — enable
      community.general.ufw:
        state: enabled
      tags: [provision]

    # ── Application deployment ────────────────────────────────────────────────
    # version defaults to main for a manual/full run, but CD always passes
    # -e app_git_version=<tested SHA> so the fleet deploys the exact commit
    # that passed CI, not whatever main happens to be at deploy time.
    - name: Clone/update application repository
      git:
        repo: https://github.com/tttaufiqqq/Animal-Shelter-Workshop.git
        dest: /home/taufiq/Animal-Shelter-Workshop
        version: "{{ app_git_version | default('main') }}"
        force: false
        update: true
      become_user: taufiq
      register: app_repo
      tags: [deploy]

    - name: Set web root ownership
      file:
        path: /home/taufiq/Animal-Shelter-Workshop
        owner: taufiq
        group: www-data
        recurse: true
      tags: [deploy]

    # Symbolic mode, not "0775" — numeric mode + recurse applies identically to
    # files and directories, which was flipping every tracked file under
    # storage/ (images, .gitignore, cacert.pem — 38 of them, confirmed via a
    # real run's `git diff --stat`: 0 insertions/deletions, pure 100644 ->
    # 100755 mode changes) to executable. Git tracks that mode bit, so every
    # subsequent deploy's git pull then failed with "Local modifications
    # exist" — a real, previously-unexercised bug, not touched by anything
    # else in this playbook. The capital X only adds execute to directories
    # (and files that already have some execute bit), leaving plain data
    # files at their existing mode.
    - name: Set storage and cache permissions
      file:
        path: "{{ item }}"
        mode: "u=rwX,g=rwX,o=rX"
        recurse: true
      loop:
        - /home/taufiq/Animal-Shelter-Workshop/storage
        - /home/taufiq/Animal-Shelter-Workshop/bootstrap/cache
      tags: [deploy]

    # Without setgid, a file created by "taufiq" (e.g. a manual `php artisan`
    # command run over SSH) inherits taufiq's primary group instead of
    # www-data, so php-fpm (running as www-data) can't write to it. This
    # bit forces every new file/dir under storage/ and bootstrap/cache to
    # inherit the www-data group regardless of which user creates it.
    - name: Force www-data group inheritance on storage and cache (setgid)
      shell: find {{ item }} -type d -exec chmod g+s {} \;
      loop:
        - /home/taufiq/Animal-Shelter-Workshop/storage
        - /home/taufiq/Animal-Shelter-Workshop/bootstrap/cache
      changed_when: false
      tags: [deploy]

    # Catches a permission/ownership regression (e.g. the setgid task above
    # being skipped, or a manual chown undoing it) at deploy time instead of
    # via a live 500 the next time Laravel tries to log something. Runs as
    # www-data specifically because that's the user that actually needs
    # write access — php-fpm, not taufiq or root.
    - name: Verify www-data can write to storage/logs
      become_user: www-data
      shell: |
        set -e
        marker=/home/taufiq/Animal-Shelter-Workshop/storage/logs/.deploy-write-check
        echo "deploy write check $(date -Iseconds)" >> "$marker"
        rm -f "$marker"
      changed_when: false
      tags: [deploy]

    # php artisan db:backup writes nightly dumps here — the whole reason for
    # centralizing on app-server, since dumps then survive losing any single
    # DB VM. group www-data + setgid (not taufiq-only 0700): /admin/backups
    # (docs/10-backups.md) reads every manifest.json here as www-data, and
    # www-data already holds live DB credentials via .env, so keeping dumps
    # locked away from it doesn't reduce blast radius. Setgid makes each
    # nightly run directory (created later by the app, not this task)
    # inherit the www-data group automatically.
    - name: Create the centralized database backups directory
      file:
        path: /home/taufiq/Animal-Shelter-Workshop/storage/app/backups
        state: directory
        owner: taufiq
        group: www-data
        mode: "02750"
      tags: [deploy]

    - name: Install Composer dependencies
      composer:
        command: install
        arguments: "--no-dev --optimize-autoloader --no-interaction"
        working_dir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      tags: [deploy]

    # force: true — .env is now fully re-renderable from Vault (asw_secrets)
    # on every deploy, APP_KEY included, so it's no longer a first-deploy-only
    # artifact. This is what makes Vault the actual live source of truth
    # instead of a one-time seed.
    - name: Deploy .env from template
      template:
        src: ../templates/env-app.j2
        dest: /home/taufiq/Animal-Shelter-Workshop/.env
        owner: taufiq
        group: www-data
        mode: "0640"
        force: true
      tags: [deploy]

    # Gated entirely by vault_agent_enabled (group_vars/all.yml) — installs and
    # (un)wires Vault Agent so php-fpm and the migrate/seed tasks below get
    # secrets injected live instead of from the (now blanked) .env fields
    # above. See playbooks/tasks/vault-agent.yml and oracle-db-learning-proxmox/
    # docs/11-vault-approle-app-integration/. Tagged provision (not deploy) —
    # CD never (re)installs or reconfigures Vault Agent; it relies on the
    # configs a provision run already left in /etc/vault-agent. `apply:` is
    # required here because include_tasks is a dynamic include — a bare
    # `tags:` on the include controls whether the include itself runs, but
    # doesn't by itself propagate into the included file's tasks.
    - name: Configure Vault Agent (or roll it back)
      include_tasks:
        file: tasks/vault-agent.yml
        apply:
          tags: [provision]
      tags: [provision]

    # when: app_repo.changed — only rebuild when the checkout actually moved.
    # Previously guarded by `creates: public/build/manifest.json`, which made
    # this a one-time-ever step: once that file existed, every subsequent
    # deploy silently kept serving stale frontend assets forever. Split into
    # two tasks because `command:` does not invoke a shell, so `npm ci && npm
    # run build` was passing `&&` as a literal argv token to npm, not chaining
    # two commands — it happened to still "work" only because the guard above
    # meant this had only ever executed once, with npm's own arg-parsing
    # papering over it.
    - name: Install npm dependencies
      command: npm ci
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      when: app_repo.changed
      tags: [deploy]

    - name: Build frontend assets
      command: npm run build
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      when: app_repo.changed
      tags: [deploy]

    # ── TLS / HTTPS ──────────────────────────────────────────────────────────
    # This whole block only runs when use_certbot is set — see the vars
    # comment above. app_domain is still required unconditionally: it names
    # the Nginx server_block regardless of who terminates TLS. Tagged
    # provision — Nginx/TLS config doesn't change per code deploy.
    - name: Fail early if TLS variables are not provided
      assert:
        that:
          - app_domain is defined
          - (app_domain | default('')) | length > 0
          - certbot_email is defined
          - (certbot_email | default('')) | length > 0
        fail_msg: >-
          app_domain and certbot_email must be set (e.g. via
          -e app_domain=shelter.example.com -e certbot_email=you@example.com)
          before this playbook can issue a Let's Encrypt certificate. A public
          DNS A record for app_domain must already point at this server, and
          inbound :443 must be reachable (UFW already allows it).
      when: use_certbot
      tags: [provision]

    - name: Install certbot
      apt:
        name: certbot
        state: present
      when: use_certbot
      tags: [provision]

    - name: Check whether a certificate already exists for app_domain
      stat:
        path: "/etc/letsencrypt/live/{{ app_domain }}/fullchain.pem"
      register: tls_cert_stat
      tags: [provision]

    - name: Deploy the shared Nginx location block (php-fpm, try_files, etc.)
      template:
        src: ../templates/nginx-locations.conf.j2
        dest: /etc/nginx/snippets/animal-shelter-locations.conf
      notify: Reload Nginx
      tags: [provision]

    - name: Deploy Nginx site config (HTTP-only bootstrap until a cert exists)
      template:
        src: ../templates/nginx-app.conf.j2
        dest: /etc/nginx/sites-available/animal-shelter
      vars:
        tls_cert_exists: "{{ tls_cert_stat.stat.exists }}"
      notify: Reload Nginx
      tags: [provision]

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/animal-shelter
        dest: /etc/nginx/sites-enabled/animal-shelter
        state: link
      notify: Reload Nginx
      tags: [provision]

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx
      tags: [provision]

    - name: Flush handlers so Nginx is already serving :80 before requesting a
        certificate (certbot's webroot challenge needs a live server)
      meta: flush_handlers

    - name: Obtain a Let's Encrypt certificate via the webroot challenge
        (first run only — later deploys see tls_cert_stat.stat.exists = true
        and skip this)
      command: >-
        certbot certonly --webroot -w /home/taufiq/Animal-Shelter-Workshop/public
        -d {{ app_domain }} -m {{ certbot_email }} --agree-tos --non-interactive
      when: use_certbot and not tls_cert_stat.stat.exists
      tags: [provision]

    - name: Re-deploy Nginx site config now that a certificate exists
        (first run only — adds the real :443 block and the :80 -> :443 redirect)
      template:
        src: ../templates/nginx-app.conf.j2
        dest: /etc/nginx/sites-available/animal-shelter
      vars:
        tls_cert_exists: true
      when: use_certbot and not tls_cert_stat.stat.exists
      notify: Reload Nginx
      tags: [provision]

    - name: Flush handlers to apply the post-certificate Nginx reload
      meta: flush_handlers

    - name: Ensure certbot's renewal timer is enabled
      systemd:
        name: certbot.timer
        enabled: true
        state: started
      when: use_certbot
      tags: [provision]

    - name: Reload Nginx automatically after certificate renewal
      copy:
        dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
        content: |
          #!/bin/sh
          systemctl reload nginx
        mode: "0755"
      when: use_certbot
      tags: [provision]

    - name: Flush handlers before migrations
      meta: flush_handlers

    # Tagged provision, alongside Seed/Mark-provisioned below — a CD
    # (--tags deploy) run must never seed, so the flag that gates seeding is
    # deliberately kept out of the deploy path entirely, not just the seed
    # task itself. Defense in depth against the "seed once" assumption ever
    # being wrong.
    - name: Check whether this server has already been provisioned
      stat:
        path: /home/taufiq/Animal-Shelter-Workshop/storage/.provisioned
      register: provisioned_flag
      tags: [provision]

    - name: Clear cached config before migrating (a stale cached config could
        point migrations at the wrong database)
      command: php artisan optimize:clear
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      tags: [deploy]

    # Idempotent — safe to run on every deploy. NEVER use db:fresh-all here:
    # it drops every table on all 5 databases and would destroy production data
    # on every redeploy. When vault_agent_enabled, .env's DBn_PASSWORD fields
    # are blank (see env-app.j2), so this must run under vault agent -exec to
    # get real DB credentials injected into the process env — see
    # playbooks/tasks/vault-agent.yml.
    - name: Run database migrations
      command: >-
        {{ 'vault agent -config=/etc/vault-agent/agent-migrate.hcl'
           if vault_agent_enabled else 'php artisan migrate --force' }}
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      environment:
        HOME: /home/taufiq
      tags: [deploy]

    - name: Seed databases (first deployment only)
      command: >-
        {{ 'vault agent -config=/etc/vault-agent/agent-seed.hcl'
           if vault_agent_enabled else 'php artisan db:seed --force' }}
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      environment:
        HOME: /home/taufiq
      when: not provisioned_flag.stat.exists
      tags: [provision]

    - name: Mark server as provisioned so future deploys never reseed
      file:
        path: /home/taufiq/Animal-Shelter-Workshop/storage/.provisioned
        state: touch
        owner: taufiq
        group: www-data
        mode: "0640"
      when: not provisioned_flag.stat.exists
      tags: [provision]

    # Skipped when vault_agent_enabled — config:cache resolves every env()
    # call in config/*.php (including the secrets env-app.j2 now leaves
    # blank) into a literal value baked into bootstrap/cache/config.php.
    # Caching it would put the exact plaintext back on disk that Vault
    # Agent exists to keep off it, regardless of where the value first came
    # from. Runtime cost of not caching config is negligible at this app's
    # traffic level. See playbooks/tasks/vault-agent.yml.
    - name: Cache application config for production
      command: php artisan config:cache
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      when: not vault_agent_enabled
      tags: [deploy]

    - name: Cache routes, views, and events for production
      command: "php artisan {{ item }}"
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      loop:
        - route:cache
        - view:cache
        - event:cache
      tags: [deploy]

    - name: Link the public storage directory
      command: php artisan storage:link
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
        creates: /home/taufiq/Animal-Shelter-Workshop/public/storage
      become_user: taufiq
      tags: [deploy]

    # ── Scheduler ──────────────────────────────────────────────────────────────
    # QUEUE_CONNECTION is `sync` (see templates/env-app.j2) — db:backup's mail
    # alert sends synchronously via Mail::send(), not ->queue(), so no queue
    # worker service is needed here either. Only the scheduler (routes/console.php:
    # db:refresh-status every minute, taufiq:refresh-stats every 5 minutes,
    # db:backup nightly at 02:00 — see docs/10-backups.md) needs a runtime.
    # Tagged provision — the systemd unit itself doesn't change per code
    # deploy; only the app code the timer invokes does.
    - name: Deploy Laravel scheduler systemd service
      template:
        src: ../templates/laravel-scheduler.service.j2
        dest: /etc/systemd/system/laravel-scheduler.service
      tags: [provision]

    - name: Deploy Laravel scheduler systemd timer
      template:
        src: ../templates/laravel-scheduler.timer.j2
        dest: /etc/systemd/system/laravel-scheduler.timer
      notify: Reload systemd units
      tags: [provision]

    - name: Flush handlers before enabling the scheduler timer
      meta: flush_handlers

    - name: Enable and start the Laravel scheduler timer
      systemd:
        name: laravel-scheduler.timer
        enabled: true
        state: started
        daemon_reload: true
      tags: [provision]

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded

    - name: Reload systemd units
      systemd:
        daemon_reload: true
