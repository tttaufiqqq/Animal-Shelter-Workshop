- name: Provision app-server (PHP 8.3 + Nginx + Composer)
  hosts: app-server
  become: true

  vars:
    # Public access is now a Cloudflare Tunnel (outbound-only, no port
    # forwarding) which terminates TLS itself — see
    # oracle-db-learning-proxmox/docs/10-cloudflare-tunnel/. The certbot
    # webroot flow below needs a public DNS A record and inbound :443, which
    # the tunnel doesn't provide, so it's off by default. Nginx still serves
    # plain HTTP on :80 for the tunnel to connect to. Set -e use_certbot=true
    # only if direct HTTPS (bypassing the tunnel) is restored later.
    use_certbot: false

  tasks:
    - name: Add ondrej/php PPA (PHP 8.3 for Ubuntu)
      apt_repository:
        repo: ppa:ondrej/php
        state: present
        update_cache: true

    - name: Install PHP 8.3 and required extensions
      apt:
        name:
          - php8.3
          - php8.3-fpm
          - php8.3-cli
          - php8.3-mbstring
          - php8.3-xml
          - php8.3-curl
          - php8.3-zip
          - php8.3-bcmath
          - php8.3-pdo
          - php8.3-mysql       # PDO MySQL (for reporting/booking/shelter/animals)
          - php8.3-pgsql       # PDO PostgreSQL (for users)
          - php8.3-gd
          - php8.3-intl
          - php8.3-redis
        state: present

    # The PDO extensions above let PHP query the 3 remote databases, but
    # php artisan db:backup shells out to the native dump/restore binaries
    # directly (mysqldump/mysql, pg_dump/pg_restore/psql) — those aren't
    # provided by the PDO packages and must be installed separately.
    - name: Install MySQL/MariaDB and PostgreSQL client tools (for db:backup / db:restore)
      apt:
        name:
          - mysql-client
          - postgresql-client
        state: present

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Install Node.js 20 LTS
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Install Composer
      shell: |
        curl -sS https://getcomposer.org/installer | php
        mv composer.phar /usr/local/bin/composer
        chmod +x /usr/local/bin/composer
      args:
        creates: /usr/local/bin/composer

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: true

    - name: Start and enable PHP-FPM
      service:
        name: php8.3-fpm
        state: started
        enabled: true

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: UFW — default deny incoming
      community.general.ufw:
        default: deny
        direction: incoming

    - name: UFW — default allow outgoing
      community.general.ufw:
        default: allow
        direction: outgoing

    - name: UFW — SSH from admin machine via Tailscale only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: "100.68.235.121"
        to_port: "22"
        proto: tcp
        comment: "SSH from msi admin machine"

    - name: UFW — HTTP public
      community.general.ufw:
        rule: allow
        to_port: "80"
        proto: tcp
        comment: "HTTP public"

    - name: UFW — HTTPS public
      community.general.ufw:
        rule: allow
        to_port: "443"
        proto: tcp
        comment: "HTTPS public"

    - name: UFW — enable
      community.general.ufw:
        state: enabled

    # ── Application deployment ────────────────────────────────────────────────
    - name: Clone/update application repository
      git:
        repo: https://github.com/tttaufiqqq/Animal-Shelter-Workshop.git
        dest: /home/taufiq/Animal-Shelter-Workshop
        version: main
        force: false
        update: true
      become_user: taufiq

    - name: Set web root ownership
      file:
        path: /home/taufiq/Animal-Shelter-Workshop
        owner: taufiq
        group: www-data
        recurse: true

    - name: Set storage and cache permissions
      file:
        path: "{{ item }}"
        mode: "0775"
        recurse: true
      loop:
        - /home/taufiq/Animal-Shelter-Workshop/storage
        - /home/taufiq/Animal-Shelter-Workshop/bootstrap/cache

    # php artisan db:backup writes nightly dumps here — the whole reason for
    # centralizing on app-server, since dumps then survive losing any single
    # DB VM. Mode 0700: these files contain full database contents.
    - name: Create the centralized database backups directory
      file:
        path: /home/taufiq/Animal-Shelter-Workshop/storage/app/backups
        state: directory
        owner: taufiq
        group: taufiq
        mode: "0700"

    - name: Install Composer dependencies
      composer:
        command: install
        arguments: "--no-dev --optimize-autoloader --no-interaction"
        working_dir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq

    # force: true — .env is now fully re-renderable from Vault (asw_secrets)
    # on every deploy, APP_KEY included, so it's no longer a first-deploy-only
    # artifact. This is what makes Vault the actual live source of truth
    # instead of a one-time seed.
    - name: Deploy .env from template
      template:
        src: ../templates/env-app.j2
        dest: /home/taufiq/Animal-Shelter-Workshop/.env
        owner: taufiq
        group: www-data
        mode: "0640"
        force: true

    - name: Build frontend assets
      command: npm ci && npm run build
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
        creates: /home/taufiq/Animal-Shelter-Workshop/public/build/manifest.json
      become_user: taufiq

    # ── TLS / HTTPS ──────────────────────────────────────────────────────────
    # This whole block only runs when use_certbot is set — see the vars
    # comment above. app_domain is still required unconditionally: it names
    # the Nginx server_block regardless of who terminates TLS.
    - name: Fail early if TLS variables are not provided
      assert:
        that:
          - app_domain is defined
          - (app_domain | default('')) | length > 0
          - certbot_email is defined
          - (certbot_email | default('')) | length > 0
        fail_msg: >-
          app_domain and certbot_email must be set (e.g. via
          -e app_domain=shelter.example.com -e certbot_email=you@example.com)
          before this playbook can issue a Let's Encrypt certificate. A public
          DNS A record for app_domain must already point at this server, and
          inbound :443 must be reachable (UFW already allows it).
      when: use_certbot

    - name: Install certbot
      apt:
        name: certbot
        state: present
      when: use_certbot

    - name: Check whether a certificate already exists for app_domain
      stat:
        path: "/etc/letsencrypt/live/{{ app_domain }}/fullchain.pem"
      register: tls_cert_stat

    - name: Deploy the shared Nginx location block (php-fpm, try_files, etc.)
      template:
        src: ../templates/nginx-locations.conf.j2
        dest: /etc/nginx/snippets/animal-shelter-locations.conf
      notify: Reload Nginx

    - name: Deploy Nginx site config (HTTP-only bootstrap until a cert exists)
      template:
        src: ../templates/nginx-app.conf.j2
        dest: /etc/nginx/sites-available/animal-shelter
      vars:
        tls_cert_exists: "{{ tls_cert_stat.stat.exists }}"
      notify: Reload Nginx

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/animal-shelter
        dest: /etc/nginx/sites-enabled/animal-shelter
        state: link
      notify: Reload Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Flush handlers so Nginx is already serving :80 before requesting a
        certificate (certbot's webroot challenge needs a live server)
      meta: flush_handlers

    - name: Obtain a Let's Encrypt certificate via the webroot challenge
        (first run only — later deploys see tls_cert_stat.stat.exists = true
        and skip this)
      command: >-
        certbot certonly --webroot -w /home/taufiq/Animal-Shelter-Workshop/public
        -d {{ app_domain }} -m {{ certbot_email }} --agree-tos --non-interactive
      when: use_certbot and not tls_cert_stat.stat.exists

    - name: Re-deploy Nginx site config now that a certificate exists
        (first run only — adds the real :443 block and the :80 -> :443 redirect)
      template:
        src: ../templates/nginx-app.conf.j2
        dest: /etc/nginx/sites-available/animal-shelter
      vars:
        tls_cert_exists: true
      when: use_certbot and not tls_cert_stat.stat.exists
      notify: Reload Nginx

    - name: Flush handlers to apply the post-certificate Nginx reload
      meta: flush_handlers

    - name: Ensure certbot's renewal timer is enabled
      systemd:
        name: certbot.timer
        enabled: true
        state: started
      when: use_certbot

    - name: Reload Nginx automatically after certificate renewal
      copy:
        dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
        content: |
          #!/bin/sh
          systemctl reload nginx
        mode: "0755"
      when: use_certbot

    - name: Flush handlers before migrations
      meta: flush_handlers

    - name: Check whether this server has already been provisioned
      stat:
        path: /home/taufiq/Animal-Shelter-Workshop/storage/.provisioned
      register: provisioned_flag

    - name: Clear cached config before migrating (a stale cached config could
        point migrations at the wrong database)
      command: php artisan optimize:clear
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq

    # Idempotent — safe to run on every deploy. NEVER use db:fresh-all here:
    # it drops every table on all 5 databases and would destroy production data
    # on every redeploy.
    - name: Run database migrations
      command: php artisan migrate --force
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      environment:
        HOME: /home/taufiq

    - name: Seed databases (first deployment only)
      command: php artisan db:seed --force
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      environment:
        HOME: /home/taufiq
      when: not provisioned_flag.stat.exists

    - name: Mark server as provisioned so future deploys never reseed
      file:
        path: /home/taufiq/Animal-Shelter-Workshop/storage/.provisioned
        state: touch
        owner: taufiq
        group: www-data
        mode: "0640"
      when: not provisioned_flag.stat.exists

    - name: Cache configuration, routes, views, and events for production
      command: "php artisan {{ item }}"
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
      become_user: taufiq
      loop:
        - config:cache
        - route:cache
        - view:cache
        - event:cache

    - name: Link the public storage directory
      command: php artisan storage:link
      args:
        chdir: /home/taufiq/Animal-Shelter-Workshop
        creates: /home/taufiq/Animal-Shelter-Workshop/public/storage
      become_user: taufiq

    # ── Scheduler ──────────────────────────────────────────────────────────────
    # QUEUE_CONNECTION is `sync` (see templates/env-app.j2) — db:backup's mail
    # alert sends synchronously via Mail::send(), not ->queue(), so no queue
    # worker service is needed here either. Only the scheduler (routes/console.php:
    # db:refresh-status every minute, taufiq:refresh-stats every 5 minutes,
    # db:backup nightly at 02:00 — see docs/10-backups.md) needs a runtime.
    - name: Deploy Laravel scheduler systemd service
      template:
        src: ../templates/laravel-scheduler.service.j2
        dest: /etc/systemd/system/laravel-scheduler.service

    - name: Deploy Laravel scheduler systemd timer
      template:
        src: ../templates/laravel-scheduler.timer.j2
        dest: /etc/systemd/system/laravel-scheduler.timer
      notify: Reload systemd units

    - name: Flush handlers before enabling the scheduler timer
      meta: flush_handlers

    - name: Enable and start the Laravel scheduler timer
      systemd:
        name: laravel-scheduler.timer
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded

    - name: Reload systemd units
      systemd:
        daemon_reload: true
